<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Venta de Fichas — Ingresar</title>
<style>
  :root { --bg:#fbf4fa; --bg2:#ffffff; --bg3:#f6e9f4; --border:#ead6e6; --text:#2b2230; --muted:#8c7e89; --gold:#c456ad; --red:#d9534f; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
         background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:30px 26px;
          width:100%; max-width:360px; box-shadow:0 16px 48px rgba(196,86,173,.12); text-align:center; }
  .logo { width:84px; height:84px; object-fit:contain; margin:0 auto 14px; display:block; }
  h1 { font-size:18px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin:0 0 22px; }
  label { display:block; text-align:left; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin:0 0 4px; }
  input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text);
          padding:12px 13px; font-size:16px; outline:none; margin-bottom:14px; }
  input:focus { border-color:var(--gold); }
  button { width:100%; background:var(--gold); color:#fff; border:none; border-radius:8px; padding:13px; font-weight:700; font-size:15px; cursor:pointer; }
  button:hover { filter:brightness(1.07); }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .err { color:var(--red); font-size:13px; min-height:18px; margin-top:10px; }
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <img src="logo.png" class="logo" alt="Latam Games" onerror="this.style.display='none'" />
    <h1>Venta de Fichas</h1>
    <p class="sub">Ingresá para entrar al panel</p>
    <label>Usuario</label>
    <input id="user" name="username" autocomplete="username" placeholder="usuario" autofocus />
    <label>Contraseña</label>
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button type="submit" id="btn">Ingresar</button>
    <div class="err" id="err"></div>
  </form>
<script>
  var form = document.getElementById('loginForm');
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Ingresando…';
    try {
      var r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user: document.getElementById('user').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      var d = await r.json();
      if (r.ok && d.ok) { window.location.href = '/'; return; }
      err.textContent = (d && d.error) || 'No se pudo ingresar';
    } catch (e2) {
      err.textContent = 'Error de red. Probá de nuevo.';
    }
    btn.disabled = false; btn.textContent = 'Ingresar';
  });
</script>
</body>
</html>
