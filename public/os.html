<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LATAM Games OS</title>
<style>
  :root { --bg:#fbf4fa; --bg2:#fff; --bg3:#f6e9f4; --border:#ead6e6; --text:#2b2230; --muted:#8c7e89; --gold:#c456ad; --green:#2e9e63; --red:#d9534f; --blue:#3b7fe0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; font-size:14px; }
  header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  header h1 { font-size:16px; margin:0; } header h1 small { color:var(--muted); font-weight:400; }
  .nav { display:flex; gap:2px; padding:0 12px; background:var(--bg2); border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; }
  .navbtn { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:11px 13px; font-weight:700; cursor:pointer; font-size:13.5px; }
  .navbtn.active { color:var(--gold); border-bottom-color:var(--gold); }
  main { max-width:1000px; margin:0 auto; padding:18px; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; }
  .card h2 { font-size:15px; margin:0 0 10px; }
  label { display:block; font-size:11px; color:var(--muted); margin:0 0 3px; text-transform:uppercase; letter-spacing:.03em; }
  input, select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:8px 10px; font-size:14px; outline:none; }
  input:focus,select:focus { border-color:var(--gold); }
  button { background:var(--gold); color:#fff; border:none; border-radius:6px; padding:8px 13px; font-weight:700; cursor:pointer; font-size:13px; }
  button.outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  button.danger { background:transparent; border:1px solid var(--red); color:var(--red); }
  button.small { padding:5px 9px; font-size:12px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .row > div { flex:1; min-width:120px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:7px 9px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-size:11px; text-transform:uppercase; }
  .badge { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge.ok { background:rgba(46,160,67,.15); color:var(--green); }
  .badge.warn { background:rgba(196,86,173,.14); color:var(--gold); }
  .badge.err { background:rgba(217,83,79,.15); color:var(--red); }
  .muted { color:var(--muted); font-size:12px; }
  .empty { color:var(--muted); text-align:center; padding:20px; }
  .right { text-align:right; }
  .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; opacity:0; transition:.2s; pointer-events:none; z-index:50; }
  .toast.show { opacity:1; }
  .pill { font-family:monospace; background:var(--bg); padding:1px 6px; border-radius:5px; }
  hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
</style>
</head>
<body>
<header>
  <h1>🎰 LATAM Games <small>OS — núcleo comercial</small></h1>
  <div style="display:flex; gap:8px; flex:0 0 auto; flex-wrap:nowrap; align-items:center">
    <a href="/" style="text-decoration:none"><button class="outline small" style="white-space:nowrap">↩ Operativo</button></a>
    <button class="outline small" onclick="logout()" style="white-space:nowrap">🚪 Salir</button>
  </div>
</header>
<nav class="nav" id="nav"></nav>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
// ───────── helpers ─────────
const TABS = [
  ['acumulado','📒 Acumulado'], ['clientes','👥 Clientes'], ['paneles','🖥 Paneles'], ['reparto','💰 Reparto'], ['facturacion','🧾 Facturación'],
  ['proveedores','🏷 Proveedores'], ['tc','💱 Tipos de cambio'], ['movimientos','💸 Movimientos'],
  ['reportes','📈 Reportes'], ['config','⚙ Config'],
];
let _tab = 'clientes';
let _clientes = [], _personas = [], _paneles = [], _proveedores = [], _repMes = '', _cfgSub = 'socios';
let _cxSel = '', _cxNodos = [];

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n,d=2){ const x=Number(n||0); return x.toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
async function api(path, opts={}){
  const r = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'}}, opts));
  if(r.status===401){ location.href='/login'; return {ok:false}; }
  let b={}; try{ b=await r.json(); }catch(e){}
  if(!b.ok && b.error) toast('⚠ '+b.error);
  return b;
}
function logout(){ fetch('/api/logout',{method:'POST'}).finally(()=>location.href='/login'); }

function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(([k,l])=>
    `<button class="navbtn ${k===_tab?'active':''}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(t){ _tab=t; renderNav(); VIEWS[t](); }

// ───────── CLIENTES ─────────
const VIEWS = {}, CFG = {};
VIEWS.clientes = async () => {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="card"><div class="empty">Cargando…</div></div>';
  const d = await api('/api/os/clientes'); _clientes = d.clientes||[];
  main.innerHTML = `
    <div class="card">
      <h2>➕ Nuevo cliente</h2>
      <div class="row" style="align-items:flex-end">
        <div style="flex:0"><label>Código</label><input id="nc-cod" placeholder="Titan" style="width:160px"/></div>
        <div><label>Nombre</label><input id="nc-nom" placeholder="Titan"/></div>
        <button onclick="nuevoCliente()">Crear cliente</button>
      </div>
      <div class="muted" style="margin-top:4px">Después con el ✎ le ponés % base, proveedores y le asignás las plataformas.</div>
    </div>
    <div class="card">
      <h2>Clientes <span class="muted">(${_clientes.length})</span></h2>
      <table><thead><tr><th>Código</th><th>Nombre</th><th>Estado</th><th>Base</th><th>USDT/Aj.</th><th>Prov.</th><th class="right">Deuda (USDT)</th><th></th></tr></thead><tbody>
      ${_clientes.map(c=>`<tr>
        <td><span class="pill">${esc(c.codigo)}</span></td>
        <td>${esc(c.nombre||'')}</td>
        <td><span class="badge ${c.estado==='activo'?'ok':'warn'}">${esc(c.estado||'')}</span></td>
        <td>${c.precio_base_pct!=null?esc(c.precio_base_pct)+'%':'<span class=badge.warn>—</span>'}</td>
        <td class="muted">${c.mezcla_pago_usdt?esc(c.mezcla_pago_usdt)+'%':'—'} / ${c.ajuste_usdt_pct?esc(c.ajuste_usdt_pct)+'%':'—'}</td>
        <td>${c.paga_proveedores?'sí':'no'}</td>
        <td class="right"><b>${money(c.deuda?c.deuda.total:0)}</b></td>
        <td class="right" style="white-space:nowrap"><button class="outline small" onclick="showPerfil('${c.id}')">👤 Perfil</button> <button class="outline small" onclick="editCli('${c.id}')">✎</button> <button class="danger small" onclick="borrarCliente('${c.id}','${esc(c.codigo)}')">🗑</button></td>
      </tr>`).join('') || '<tr><td colspan="8" class="empty">Sin clientes todavía. Creá uno arriba ☝️</td></tr>'}
      </tbody></table>
    </div>
    <div id="cliEdit"></div>`;
};
async function nuevoCliente(){
  const codigo=val('nc-cod'); if(!codigo) return toast('Poné un código');
  const r=await api('/api/os/clientes',{method:'POST',body:JSON.stringify({codigo, nombre:val('nc-nom')})});
  if(r.ok){ toast('Cliente creado: '+(r.cliente&&r.cliente.codigo||codigo)); VIEWS.clientes(); }
}
async function borrarCliente(id, codigo){
  if(!confirm('¿Borrar el cliente "'+codigo+'"?\n\nEsto borra TAMBIÉN sus plataformas/paneles, % de proveedores, participaciones y movimientos. No se puede deshacer.')) return;
  const r=await api('/api/os/clientes/'+id,{method:'DELETE'});
  if(r.ok){ toast('Cliente borrado'); VIEWS.clientes(); }
}
function editCli(id){
  const c = _clientes.find(x=>x.id===id); if(!c) return;
  document.getElementById('cliEdit').innerHTML = `
    <div class="card">
      <h2>✎ ${esc(c.nombre||c.codigo)} <span class="muted">${esc(c.codigo)}</span></h2>
      <div class="row">
        <div><label>Estado</label><select id="e-estado">${['activo','inactivo','suspendido'].map(s=>`<option ${c.estado===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label>Mezcla pago USDT %</label><input id="e-mez" value="${esc(c.mezcla_pago_usdt||'')}" placeholder="80"/></div>
        <div><label>Ajuste USDT %</label><input id="e-aj" value="${esc(c.ajuste_usdt_pct||'')}" placeholder="-2.8"/></div>
        <div style="flex:0"><label>Paga proveedores</label><select id="e-pp"><option value="0" ${!c.paga_proveedores?'selected':''}>no</option><option value="1" ${c.paga_proveedores?'selected':''}>sí</option></select></div>
        <div style="flex:0"><label>Permite deuda</label><select id="e-pd"><option value="0" ${!c.permite_deuda?'selected':''}>no</option><option value="1" ${c.permite_deuda?'selected':''}>sí</option></select></div>
        <button onclick="saveCli('${id}')">💾 Guardar</button>
      </div>
      <hr/>
      <h2>Precio base <span class="muted">(con vigencia/corrección)</span></h2>
      <div class="row">
        <div><label>Valor %</label><input id="pb-val" value="${esc(c.precio_base_pct||'')}" placeholder="11"/></div>
        <div style="flex:0"><label>Tipo</label><select id="pb-tipo"><option value="vigencia">vigencia (desde fecha)</option><option value="correccion">corrección (retroactivo)</option></select></div>
        <div><label>Vigente desde</label><input id="pb-desde" type="date"/></div>
        <button onclick="savePB('${id}')">Aplicar</button>
        <button class="outline" onclick="verPBHist('${id}')">Ver historial</button>
      </div>
      <div id="pb-hist" class="muted"></div>
    </div>
    <div id="cliPlat"><div class="card"><div class="empty">Cargando plataformas…</div></div></div>
    <div id="cliProv"><div class="card"><div class="empty">Cargando proveedores…</div></div></div>`;
  loadCliPlat(id);
  loadCliProv(id);
}
// ── Plataformas / cuentas del cliente — asignador LEVEL-FLEXIBLE con checkboxes ──
async function loadCliPlat(id){
  const cxs = (await api('/api/os/casino/conexiones')).conexiones||[];
  window._platCxs = cxs;
  const opts = cxs.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
  document.getElementById('cliPlat').innerHTML = `
    <div class="card">
      <h2>🛰️ Plataformas / cuentas <span class="muted">(asigná las cuentas de este cliente, al nivel que sea)</span></h2>
      ${cxs.length ? `
      <div class="row" style="align-items:flex-end">
        <div><label>Conexión / sistema</label><select id="plat-cx">${opts}</select></div>
        <div style="flex:0"><button class="outline" onclick="loadAccts('${id}')">⤓ Cargar cuentas</button></div>
      </div>
      <div id="plat-list" class="muted" style="margin-top:8px">Elegí una conexión y tocá "Cargar cuentas". Filtrás por nivel (lo que esa cuenta vea: superagente, distribuidor, master…) + buscador, y tildás las de este cliente.</div>
      ` : '<div class="empty">No hay conexiones. Cargá una en Config → 🎰 Casino primero.</div>'}
    </div>`;
}
async function loadAccts(id){
  const cx = val('plat-cx'); if(!cx) return toast('Elegí una conexión');
  const box = document.getElementById('plat-list'); box.innerHTML='⏳ trayendo cuentas… la 1ra vez puede tardar ~20-30s si la cuenta ve muchas (después es instantáneo)';
  const pr = await api('/api/os/paneles?cliente_id='+id);
  const panels = (pr.paneles||[]).filter(p=>p.conexion_id===cx && p.id_usuario);
  const r = await api('/api/os/casino/conexiones/'+cx+'/nodos-nivel'); // default = nivel más alto, SOLO ese nivel (server cachea el árbol)
  if(!r.ok){ box.innerHTML='<span class="badge err">No se pudieron traer las cuentas (¿conexión OK?)</span>'; return; }
  window._accState = { cx, id, panels, sel: new Set(panels.map(p=>String(p.id_usuario))), nodeById:{}, niveles:r.niveles||{}, nivel:r.nivel, current:[], truncado:false };
  _mergeNivel(r);
  const niveles = Object.keys(r.niveles||{}).sort((a,b)=>r.niveles[a]-r.niveles[b]); // el nivel más alto (menos nodos) primero
  box.innerHTML = `
    <div class="row" style="align-items:flex-end; margin-bottom:6px">
      <div style="flex:0"><label>Nivel</label><select id="acc-niv" onchange="changeNivel()">${niveles.map(k=>`<option value="${esc(k)}" ${k===r.nivel?'selected':''}>${esc(k)} (${r.niveles[k]})</option>`).join('')}</select></div>
      <div><label>Buscar (login)</label><input id="acc-q" oninput="renderAccts()" placeholder="filtrar por login…"/></div>
      <div style="flex:0"><label style="display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer"><input type="checkbox" id="acc-act" checked onchange="renderAccts()"/> ocultar sin actividad</label></div>
      <div style="flex:0"><button onclick="saveAccts()">💾 Guardar selección</button></div>
    </div>
    <div id="acc-rows"></div>`;
  renderAccts();
}
function _mergeNivel(r){ const st=window._accState; if(!st)return; (r.nodos||[]).forEach(n=>{ st.nodeById[String(n.id)]=n; }); st.current=r.nodos||[]; st.nivel=r.nivel; st.truncado=!!r.truncado; }
async function changeNivel(){
  const st=window._accState; if(!st)return; const niv=val('acc-niv');
  const rows=document.getElementById('acc-rows'); rows.innerHTML='⏳ cargando nivel…';
  const r=await api('/api/os/casino/conexiones/'+st.cx+'/nodos-nivel?nivel='+encodeURIComponent(niv));
  if(r.ok){ _mergeNivel(r); renderAccts(); } else rows.innerHTML='<span class="badge err">error trayendo el nivel</span>';
}
function renderAccts(){
  const st = window._accState; if(!st) return;
  const q = (val('acc-q')||'').toLowerCase();
  let list = st.current||[];
  if((document.getElementById('acc-act')||{}).checked) list = list.filter(n=>!(Number(n.in||0)===0 && Number(n.out||0)===0 && Number(n.profit||0)===0));
  if(q) list = list.filter(n=>String(n.login).toLowerCase().includes(q));
  list.sort((a,b)=>String(a.login).localeCompare(String(b.login)));
  const CAP=400, shown=list.slice(0,CAP);
  document.getElementById('acc-rows').innerHTML = `
    <div class="muted" style="margin-bottom:4px">${list.length} cuentas en "${esc(st.nivel)}"${(st.truncado||list.length>CAP)?(' · muestro hasta '+CAP+', refiná con el buscador'):''} · seleccionadas (todos los niveles): ${st.sel.size}</div>
    <table><thead><tr><th></th><th>Cuenta</th><th>ID</th><th class="right">IN (ARS)</th><th class="right">Profit</th></tr></thead><tbody>
    ${shown.map(n=>`<tr>
      <td><input type="checkbox" class="acc-chk" onchange="toggleAcct('${esc(String(n.id))}',this.checked)" ${st.sel.has(String(n.id))?'checked':''}/></td>
      <td><b>${esc(n.login)}</b></td><td><span class="pill">${esc(n.id)}</span></td>
      <td class="right">${money(n.in,0)}</td><td class="right">${money(n.profit,0)}</td>
    </tr>`).join('')||'<tr><td colspan="5" class="empty">No hay cuentas en este nivel/búsqueda.</td></tr>'}
    </tbody></table>`;
}
function toggleAcct(nodeId, checked){ const st=window._accState; if(!st)return; if(checked) st.sel.add(String(nodeId)); else st.sel.delete(String(nodeId)); }
async function saveAccts(){
  const st = window._accState; if(!st) return;
  const cxName = (window._platCxs||[]).find(c=>c.id===st.cx); const sistema = cxName?cxName.nombre:'';
  const origIds = new Set(st.panels.map(p=>String(p.id_usuario)));
  const toCreate = [...st.sel].filter(idd=>!origIds.has(idd));
  const toDelete = st.panels.filter(p=>!st.sel.has(String(p.id_usuario)));
  let creados=0, borrados=0;
  for(const idd of toCreate){ const n=st.nodeById[idd]; if(!n)continue;
    await api('/api/os/paneles',{method:'POST',body:JSON.stringify({cliente_id:st.id, nombre:n.login, sistema, nivel_usuario:(n.nivel||''), tipo:'exclusivo', id_usuario:n.id, conexion_id:st.cx, divisas:'ARS'})}); creados++;
  }
  if(toDelete.length){ if(confirm('Vas a DESVINCULAR '+toDelete.length+' cuenta(s) de este cliente (se borran esos paneles). ¿Seguir?')){
    for(const p of toDelete){ await api('/api/os/paneles/'+p.id,{method:'DELETE'}); borrados++; }
  }}
  toast('Cuentas: +'+creados+(borrados?(' / -'+borrados):'')); loadAccts(st.id);
}
async function loadCliProv(id){
  const r = await api('/api/os/clientes/'+id+'/proveedores');
  const provs = r.proveedores||[];
  const rows = provs.map(p=>`<tr>
    <td>${esc(p.nombre||'')}</td>
    <td><span class="badge ${p.categoria==='extra'?'warn':''}">${esc(p.categoria||'')}</span></td>
    <td class="muted">${p.tarifa_global!=null?esc(p.tarifa_global)+'%':'—'}</td>
    <td><input id="cp-${p.proveedor_id}" value="${p.tarifa_cliente!=null?esc(p.tarifa_cliente):''}" placeholder="${p.tarifa_global!=null?esc(p.tarifa_global):'—'}" style="width:90px"/></td>
    <td class="right" style="white-space:nowrap"><button class="small" onclick="saveCliProv('${id}','${p.proveedor_id}')">💾</button>${p.tarifa_cliente!=null?` <button class="outline small" onclick="delCliProv('${id}','${p.proveedor_id}')">↺ global</button>`:''}</td>
  </tr>`).join('');
  document.getElementById('cliProv').innerHTML = `
    <div class="card">
      <h2>🎰 % de proveedores <span class="muted">(rige para TODOS los paneles de este cliente)</span></h2>
      <p class="muted" style="margin-top:-4px">Dejá vacío para usar el % global del catálogo. Lo que pongas acá pisa el global solo para este cliente.</p>
      <table><thead><tr><th>Proveedor</th><th>Cat.</th><th>Global</th><th>% este cliente</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="empty">No hay proveedores en el catálogo. Cargalos primero en la solapa 🏷 Proveedores.</td></tr>'}</tbody></table>
    </div>`;
}
async function saveCliProv(id, provId){
  await api('/api/os/clientes/'+id+'/proveedores',{method:'POST',body:JSON.stringify({proveedor_id:provId, tarifa_pct:val('cp-'+provId)})});
  toast('Guardado'); loadCliProv(id);
}
async function delCliProv(id, provId){
  await api('/api/os/clientes/'+id+'/proveedores/'+provId,{method:'DELETE'});
  toast('Volvió al % global'); loadCliProv(id);
}
async function saveCli(id){
  await api('/api/os/clientes/'+id+'/comercial',{method:'PUT',body:JSON.stringify({
    estado:val('e-estado'), mezcla_pago_usdt:val('e-mez'), ajuste_usdt_pct:val('e-aj'),
    paga_proveedores:val('e-pp')==='1', permite_deuda:val('e-pd')==='1' })});
  toast('Guardado'); VIEWS.clientes();
}
async function savePB(id){
  const b={valor:val('pb-val'), tipo_cambio:val('pb-tipo'), vigente_desde:val('pb-desde')};
  if(b.tipo_cambio==='vigencia' && !b.vigente_desde) return toast('Poné la fecha de vigencia');
  const r=await api('/api/os/clientes/'+id+'/precio-base',{method:'PUT',body:JSON.stringify(b)});
  if(r.ok){ toast('Precio base: '+r.precio_base_pct+'%'); VIEWS.clientes(); }
}
async function verPBHist(id){
  const r=await api('/api/os/clientes/'+id+'/precio-base/historial');
  document.getElementById('pb-hist').innerHTML = '<hr/>'+(r.historial||[]).map(h=>`• ${esc(h.valor)}% — desde ${esc(h.vigente_desde)} ${h.vigente_hasta?('hasta '+esc(h.vigente_hasta)):'(vigente)'}`).join('<br/>') || 'sin historial';
}
async function showPerfil(id){
  const main=document.getElementById('main'); main.innerHTML='<div class="card"><div class="empty">Cargando perfil…</div></div>';
  const r=await api('/api/os/clientes/'+id+'/perfil?meses=6');
  if(!r.ok){ main.innerHTML='<div class="card"><div class="empty">Error cargando el perfil</div></div>'; return; }
  const c=r.cliente, d=r.deuda||{}, hp=(r.historial_pct||[]);
  main.innerHTML = `
    <div class="card">
      <div class="row" style="align-items:center"><button class="outline small" onclick="VIEWS.clientes()">← Volver</button>
        <h2 style="margin:0 0 0 10px">👤 ${esc(c.nombre||c.codigo)} <span class="muted">${esc(c.codigo)}</span></h2></div>
      <div class="row" style="align-items:stretch; margin-top:10px">
        <div class="card" style="flex:1;background:var(--bg3);margin:0"><label>Estado</label><div style="font-size:18px;font-weight:800">${esc(c.estado||'')}</div></div>

  const r = await api('/api/os/split-base/'+encodeURIComponent(pct),{method:'PUT',body:JSON.stringify({

  if(r.ok) toast('Split '+pct+'% guardado'); CFG.split();
}
async function addSplit(){
  const base=val('ns-base'); if(!base) return toast('Poné el % base');
  const r=await api('/api/os/split-base/'+encodeURIComponent(base),{method:'PUT',body:JSON.stringify({pct_empresa:val('ns-emp'),pct_latam:val('ns-lat'),notas:val('ns-not')})});
  if(r.ok) toast('Entrada '+base+'% agregada'); CFG.split();
}
async function delSplit(pct){
  if(!confirm('¿Borrar la entrada '+pct+'% de la tabla?'))return;
  const r=await api('/api/os/split-base/'+encodeURIComponent(pct),{method:'DELETE'});
  if(r.ok) toast('Borrada'); CFG.split();
}

  if(cxs.length) verAcumulado(); else document.getElementById('ac-out').innerHTML='<div class="empty">Agregá una conexión en Config → 🎰 Casino primero.</div>';
};
function acMes(delta){ const el=document.getElementById('ac-mes'); if(!el)return; let [y,m]=el.value.split('-').map(Number); m+=delta; if(m<1){m=12;y--;} if(m>12){m=1;y++;} el.value=y+'-'+String(m).padStart(2,'0'); _acMes=el.value; verAcumulado(); }
function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

renderNav(); go('acumulado');
